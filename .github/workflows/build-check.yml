name: KAVACH Build Check

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  check-backend:
    runs-on: ubuntu-latest
    name: Backend TypeScript Check
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      
      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit
      
      - name: Notify result
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            MSG="Build check PASSED"
          else
            EMOJI="❌"  
            MSG="Build check FAILED — fix before merge!"
          fi
          
          TEXT="$EMOJI <b>KAVACH — $MSG</b>

👤 PR by: $AUTHOR
🔗 <a href='$PR_URL'>View PR</a>"
          
          curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"

  check-frontend:
    runs-on: ubuntu-latest
    name: Frontend Build Check
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: TypeScript + Vite build check
        working-directory: frontend
        run: npm run build

  check-ml:
    runs-on: ubuntu-latest
    name: ML Service Syntax Check
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt
      
      - name: Python syntax check
        working-directory: ml-service
        run: python -m py_compile main.py && python -m py_compile synthetic_logs.py
